name: Deploy Exhibition Website

on:
  push:
    branches: ["main"]
    paths:
      - 'exhibition-website/**' # Only triggers when you change the website files

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This tells GitHub to ONLY host the contents of this folder
          path: './exhibition-website'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
