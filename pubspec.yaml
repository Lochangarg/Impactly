name: impactly_new
description: A new Flutter project for Impactly with cleaned folder structure and authentication UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  parse_server_sdk_flutter: ^10.7.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.5.2
  flutter_localizations:
    sdk: flutter
  translator: ^1.0.4+1
  app_links: ^7.0.0
  http: ^1.2.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "Impactly_app_icon.png"
  web:
    generate: true
    image_path: "Impactly_app_icon.png"
    favicon_path: "Impactly_app_icon.png"
  windows:
    generate: true
    image_path: "Impactly_app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "Impactly_app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env